name: 'Terraform Production'

on:
  push:
    tags:
      - 'v*'                           # only triggers on version tags like v1.0.0

env:
  TF_DIR: terraform/environments/prod

jobs:
  plan:
    name: 'Plan Production'
    runs-on: ubuntu-latest
    environment: prod-plan             # first approval gate
    defaults:
      run:
        working-directory: ${{ env.TF_DIR }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with: { terraform_version: '1.10.0' }
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - run: terraform init
      - run: terraform plan -out=tfplan -no-color -input=false
          -var="db_password=${{ secrets.DB_PASSWORD }}"
      - name: Upload plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_DIR }}/tfplan
          retention-days: 1

  apply:
    name: 'Apply Production'
    runs-on: ubuntu-latest
    needs: plan                        # waits for plan job to finish
    environment: prod-apply            # second approval gate
    defaults:
      run:
        working-directory: ${{ env.TF_DIR }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with: { terraform_version: '1.7.0' }
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - name: Download plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_DIR }}
      - run: terraform init
      - run: terraform apply -auto-approve -input=false tfplan
      - run: terraform output
